name: MLflow Training with Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/mlflow-docker.yml'
  workflow_dispatch: # Manual Docker image build (updated trigger)

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: tjutee
      DOCKER_IMAGE_NAME: tjutee/customer-segmentation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas matplotlib numpy
      
      - name: Download dataset
        run: |
          if [ ! -f MLProject/Customer-Segmentation_preprocessing.csv ]; then
            echo "Dataset tidak ditemukan, silakan upload ke repository"
            exit 1
          fi
      
      - name: Run MLflow Training
        working-directory: ./MLProject
        run: |
          python modelling.py \
            --dataset_path "Customer-Segmentation_preprocessing.csv" \
            --n_clusters 3 \
            --random_state 42

      - name: Validate Docker Hub credentials
        if: success()
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "::error::DOCKER_USERNAME belum diset di workflow."
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Secret DOCKERHUB_TOKEN belum diset di repository GitHub."
            exit 1
          fi
      
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image using MLflow
        if: success()
        working-directory: ./MLProject
        run: |
          set -euo pipefail

          # Dapatkan Run ID dari eksperimen terakhir via Python API
          RUN_ID=$(python -c "import mlflow; runs = mlflow.search_runs(experiment_names=['Customer Segmentation - Basic'], order_by=['start_time DESC']); print(runs.iloc[0].run_id if len(runs) > 0 else '')")
          IMAGE_NAME="$DOCKER_IMAGE_NAME"
          VERSION_TAG="${{ github.run_number }}"

          if [ -z "$RUN_ID" ]; then
            echo "::error::RUN_ID tidak ditemukan dari eksperimen 'Customer Segmentation - Basic'."
            exit 1
          fi

          if [ -z "$IMAGE_NAME" ]; then
            echo "::error::DOCKER_IMAGE_NAME kosong."
            exit 1
          fi

          echo "RUN_ID: $RUN_ID"
          echo "IMAGE_NAME: $IMAGE_NAME"
          echo "Membangun Docker image dengan mlflow models build-docker..."
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "$IMAGE_NAME"

          echo "Validasi image lokal..."
          docker image inspect "$IMAGE_NAME:latest" >/dev/null

          echo "Mendorong image latest ke Docker Hub..."
          docker push "$IMAGE_NAME:latest"

          echo "Memberikan tag versioning dan mendorong..."
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:$VERSION_TAG"
          docker push "$IMAGE_NAME:$VERSION_TAG"

      - name: Prepare artifacts for repository
        if: always()
        run: |
          mkdir -p github-artifacts/mlflow-docker
          rm -rf github-artifacts/mlflow-docker/*

          if [ -d MLProject/mlruns ]; then
            cp -R MLProject/mlruns github-artifacts/mlflow-docker/mlruns
          fi

          cp MLProject/Customer-Segmentation_clustered_basic.csv github-artifacts/mlflow-docker/ 2>/dev/null || true
          cp MLProject/pca_projection_basic.csv github-artifacts/mlflow-docker/ 2>/dev/null || true
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-docker
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
            github-artifacts/mlflow-docker/
          retention-days: 30

      - name: Commit artifacts to GitHub repository
        if: github.event_name != 'pull_request' && success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MLflow Docker artifacts [skip ci]"
          file_pattern: github-artifacts/mlflow-docker/**
