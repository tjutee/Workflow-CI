name: MLflow Training with Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/mlflow-docker.yml'
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas matplotlib numpy
      
      - name: Download dataset
        run: |
          mkdir -p data
          if [ ! -f data/Customer-Segmentation_preprocessing.csv ]; then
            echo "Dataset tidak ditemukan, silakan upload ke repository"
            exit 1
          fi
      
      - name: Run MLflow Project Training
        working-directory: ./MLProject
        run: |
          mlflow run . \
            --param dataset_path="../data/Customer-Segmentation_preprocessing.csv" \
            --param n_clusters=3 \
            -v
      
      - name: Build Docker image with mlflow
        if: success()
        working-directory: ./MLProject
        run: |
          # Install docker build tools
          pip install docker
          
          # Build Docker image (memerlukan Docker daemon)
          # mlflow build-docker -m . -n customer-segmentation:latest
          
          echo "Docker image build configuration:"
          echo "Image name: customer-segmentation:latest"
          echo "Dockerfile akan dibuat otomatis dari MLProject"
      
      - name: Set up Docker Buildx
        if: success()
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./MLProject
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/customer-segmentation:latest
            ${{ secrets.DOCKER_USERNAME }}/customer-segmentation:${{ github.run_number }}
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mlflow-artifacts-docker
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
