name: MLflow Training with Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/mlflow-docker.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas matplotlib numpy
      
      - name: Download dataset
        run: |
          if [ ! -f MLProject/Customer-Segmentation_preprocessing.csv ]; then
            echo "Dataset tidak ditemukan, silakan upload ke repository"
            exit 1
          fi
      
      - name: Run MLflow Project Training
        working-directory: ./MLProject
        run: |
          mlflow run . \
            -e train \
            --env-manager=local \
            --experiment-name "Customer Segmentation - Basic" \
            -P dataset_path="Customer-Segmentation_preprocessing.csv" \
            -P n_clusters=3
      
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image using MLflow
        if: success()
        working-directory: ./MLProject
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Dapatkan Run ID dari eksperimen terakhir via Python API
          RUN_ID=$(python -c "import mlflow; runs = mlflow.search_runs(experiment_names=['Customer Segmentation - Basic'], order_by=['start_time DESC']); print(runs.iloc[0].run_id)")
          IMAGE_NAME="${DOCKER_USERNAME}/customer-segmentation"

          echo "Membangun Docker image menggunakan mlflow models build-docker untuk Run ID: $RUN_ID..."
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n "$IMAGE_NAME:latest"

          echo "Mendorong image ke Docker Hub..."
          docker push "$IMAGE_NAME:latest"

          echo "Memberikan tag versioning dan mendorong..."
          docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:${{ github.run_number }}"
          docker push "$IMAGE_NAME:${{ github.run_number }}"

      - name: Prepare artifacts for repository
        if: always()
        run: |
          mkdir -p github-artifacts/mlflow-docker
          rm -rf github-artifacts/mlflow-docker/*

          if [ -d MLProject/mlruns ]; then
            cp -R MLProject/mlruns github-artifacts/mlflow-docker/mlruns
          fi

          cp MLProject/Customer-Segmentation_clustered_basic.csv github-artifacts/mlflow-docker/ 2>/dev/null || true
          cp MLProject/pca_projection_basic.csv github-artifacts/mlflow-docker/ 2>/dev/null || true
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-docker
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
            github-artifacts/mlflow-docker/
          retention-days: 30

      - name: Commit artifacts to GitHub repository
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MLflow Docker artifacts [skip ci]"
          file_pattern: github-artifacts/mlflow-docker/**
