name: MLflow CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'MLProject/**'
      - 'data/**'
      - '.github/workflows/mlflow-training.yml'
  pull_request:
    branches: [ main ]
  schedule:
    # Jalankan training setiap minggu (Senin pukul 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas matplotlib numpy
      
      - name: Download dataset (if needed)
        run: |
          if [ ! -f MLProject/Customer-Segmentation_preprocessing.csv ]; then
            echo "Dataset belum ada, silakan upload ke repository atau ubah path"
            exit 1
          fi
      
      - name: Run MLflow Training
        working-directory: ./MLProject
        run: |
          python modelling.py \
            --dataset_path "Customer-Segmentation_preprocessing.csv" \
            --n_clusters 3 \
            --random_state 42

      - name: Prepare artifacts for repository
        if: always()
        run: |
          mkdir -p github-artifacts/mlflow-training
          rm -rf github-artifacts/mlflow-training/*

          if [ -d MLProject/mlruns ]; then
            cp -R MLProject/mlruns github-artifacts/mlflow-training/mlruns
          fi

          cp MLProject/Customer-Segmentation_clustered_basic.csv github-artifacts/mlflow-training/ 2>/dev/null || true
          cp MLProject/pca_projection_basic.csv github-artifacts/mlflow-training/ 2>/dev/null || true
      
      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
            github-artifacts/mlflow-training/
          retention-days: 30

      - name: Commit artifacts to GitHub repository
        if: github.event_name != 'pull_request' && success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MLflow training artifacts [skip ci]"
          file_pattern: github-artifacts/mlflow-training/**
      
      - name: Create run summary
        if: always()
        run: |
          echo "## MLflow Training Run 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Training completed" >> $GITHUB_STEP_SUMMARY
