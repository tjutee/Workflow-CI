name: MLflow CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'MLProject/**'
      - 'data/**'
      - '.github/workflows/mlflow-training.yml'
  pull_request:
    branches: [ main ]
  schedule:
    # Jalankan training setiap minggu (Senin pukul 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas matplotlib numpy
      
      - name: Download dataset (if needed)
        run: |
          if [ ! -f MLProject/Customer-Segmentation_preprocessing.csv ]; then
            echo "Dataset belum ada, silakan upload ke repository atau ubah path"
            exit 1
          fi
      
      - name: Run MLflow Project Training
        working-directory: ./MLProject
        run: |
          mlflow run . \
            -e train \
            --env-manager=local \
            --experiment-name "Customer Segmentation - Basic" \
            -P dataset_path="Customer-Segmentation_preprocessing.csv" \
            -P n_clusters=3 \
            -P random_state=42
      
      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
      
      - name: Create run summary
        if: always()
        run: |
          echo "## MLflow Training Run 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Training completed" >> $GITHUB_STEP_SUMMARY
